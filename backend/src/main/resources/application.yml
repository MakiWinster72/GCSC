spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gcsc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: gcsc
    password: gcsc
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

server:
  port: 8080

app:
  upload-dir: ./uploads

security:
  cors:
    allowed-origins: "*"
  jwt:
    secret: gcsc-student-center-jwt-secret-key-change-in-production-2026
    expires-minutes: 120
