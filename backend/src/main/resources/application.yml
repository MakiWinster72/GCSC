spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  datasource:
    url: "${BDAI_SC_DB_URL:jdbc:mysql://127.0.0.1:3306/bdai_sc?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: "${BDAI_SC_DB_USER:bdai_sc}"
    password: "${BDAI_SC_DB_PASSWORD:bdai_sc}"
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

server:
  port: ${BDAI_SC_BACKEND_PORT:8080}

app:
  site-url: "${BDAI_SC_SITE_URL:http://localhost:5173}"
  backend-url: "${BDAI_SC_BACKEND_URL:http://localhost:8080}"
  upload-dir: "${BDAI_SC_UPLOAD_DIR:./uploads}"

security:
  cors:
    allowed-origins: "${BDAI_SC_CORS_ALLOWED_ORIGINS:*}"
  jwt:
    secret: "${BDAI_SC_JWT_SECRET:bdai_sc-student-center-jwt-secret-key-change-in-production-2026}"
    expires-minutes: ${BDAI_SC_JWT_EXPIRES_MINUTES:120}
